<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5B4636"/>
      <stop offset="100%" stop-color="#3a2c20"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#9C7C38"/>
      <stop offset="100%" stop-color="#b89456"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- subtle frame -->
  <rect x="40" y="40" width="1120" height="550" fill="none" stroke="rgba(232,222,201,0.14)" stroke-width="1"/>

  <!-- top eyebrow -->
  <line x1="120" y1="120" x2="180" y2="120" stroke="url(#gold)" stroke-width="2"/>
  <text x="200" y="125" fill="rgba(232,222,201,0.65)" font-family="'Montserrat',Helvetica,Arial,sans-serif" font-size="14" letter-spacing="6">INTERIOR &#x2022; EXTERIOR &#x2022; BESPOKE</text>

  <!-- main title -->
  <text x="120" y="360" fill="#E8DEC9" font-family="'Cormorant Garamond','Times New Roman',serif" font-weight="300" font-size="200" letter-spacing="-4">OTIL&#204;A</text>
  <text x="124" y="410" fill="rgba(232,222,201,0.6)" font-family="'Montserrat',Helvetica,Arial,sans-serif" font-size="20" letter-spacing="14">INTERIOR DESIGN</text>

  <!-- gold rule -->
  <line x1="120" y1="470" x2="280" y2="470" stroke="url(#gold)" stroke-width="2"/>

  <!-- pillars -->
  <text x="120" y="520" fill="#E8DEC9" font-family="'Cormorant Garamond','Times New Roman',serif" font-style="italic" font-weight="300" font-size="34">Luxury &#xb7; Minimal &#xb7; Elegant</text>

  <!-- diamond accent top right -->
  <g transform="translate(1080,120) rotate(45)">
    <rect x="-7" y="-7" width="14" height="14" fill="#9C7C38"/>
  </g>
</svg>
